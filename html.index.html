<html>
<head>


	<style>
		.box {
			width: 100px;
			height: 100px;
			background-color: blue;
			animation: move 2s ease-in 1s infinite alternate forwards  ;
		}
 
		@keyframes move {
			from {
                transform: translateX(0);
				background-color: rgb;
			}

			to {
                transform: translateX(200px);
				background-color: green;
			}
		}
	</style>



</head>

<body>
	<div class="box"></div>
</body>

</html>
